name: Feature request
description: Propose an enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the value and expected behavior.
  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
      placeholder: We could add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other options did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or examples from similar tools.
